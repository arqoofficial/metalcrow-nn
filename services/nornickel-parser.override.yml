# Overlay for the standalone nornickel-2026-parser compose stack.
#
# 1. Attaches the parser API service (`main`) to the shared external
#    `metalcrow-net` under the DNS alias `parser-main`, so metalcrow
#    (backend, science-knowledge-graph) can reach it at http://parser-main:8114
#    while the parser keeps its own internal `parser-net`.
#
# 2. Gates the Docling/OCR workers behind a `parsing` compose profile.
#    `make up` / dev-up.sh opt in with `--profile parsing` because ingest upload
#    enqueues L1 jobs that require these workers. To run API-only (read existing
#    SHARED markdown without new parsing):
#      docker compose ... up -d   # without --profile parsing
#
# Create the network once:  docker network create metalcrow-net
#
# Usage (file-serving only, no models):
#   docker compose \
#     -f services/nornickel-2026-parser/docker-compose.yml \
#     -f services/nornickel-parser.override.yml up -d --build
services:
  main:
    # Build the lightweight API image (no torch/docling/easyocr) — main only
    # serves files, so it doesn't need the heavy parsing stack. See Dockerfile.api.
    build:
      context: .
      dockerfile: Dockerfile.api
    image: nornickel-2026-parser:api
    networks:
      parser-net: {}
      metalcrow-net:
        aliases:
          - parser-main

  raw2docling_raw:
    profiles: ["parsing"]
    build:
      context: .
      args:
        TORCH_VARIANT: cpu

  docling_raw2docling_clean00:
    profiles: ["parsing"]
    build:
      context: .
      args:
        TORCH_VARIANT: cpu

networks:
  metalcrow-net:
    external: true
