services:

  db:
    # pgvector/pgvector:pg18, NOT vanilla postgres:18 — иначе не встанет
    # `CREATE EXTENSION vector` (SPEC_V3 §3 п.12, §4).
    image: pgvector/pgvector:pg18
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-changethis}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-changethis}
      - MINIO_BUCKET=${MINIO_BUCKET:-metalcrow-documents}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$MINIO_BUCKET
      "
    restart: "no"

  # Neo4j — опциональный компонент (SPEC_V3 §3 п.8, P1), первый кандидат на
  # отрез при нехватке времени. Graph API деградирует до 503/SQL fallback,
  # если контейнер недоступен (см. app/services/graph.py, Фаза 4).
  neo4j:
    image: neo4j:5-community
    restart: always
    # NB: не подключаем env_file: .env — образ neo4j трактует ЛЮБУЮ переменную
    # NEO4J_* как настройку конфига (напр. NEO4J_URI -> "dbms.uri"), а наши
    # NEO4J_URI/NEO4J_USER/NEO4J_PASSWORD — это клиентские переменные для
    # backend, а не для самого сервера.
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD?Variable not set}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      # Bind mount (not a named volume) — a real, visible folder in the repo
      # (gitignored), so the GraphRAG data isn't hidden inside Docker's own
      # storage and survives `docker compose down -v` unconditionally (bind
      # mounts are never touched by `-v`, unlike named volumes).
      - ./neo4j-data:/data

  # science-knowledge-graph — standalone spaCy/scispaCy NER + Neo4j GraphRAG
  # sidecar. Internal-only (no published port), called by backend as a tool
  # over HTTP (SCIENCE_KG_URL below) — see
  # services/science-knowledge-graph/README.md. Shares the `neo4j` service
  # above with its own graph, unrelated to the SQL/pgvector schema.
  science-knowledge-graph:
    build:
      context: services/science-knowledge-graph
      dockerfile: Dockerfile
    restart: always
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD?Variable not set}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.proxyapi.ru/openai/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - default
      # nornickel-2026-parser reached over the shared external metalcrow-net —
      # scripts/ingest_shared_corpus.py (run via `docker compose exec`) talks
      # to it at http://parser-main:8114, same alias svc-parse-docling uses.
      - metalcrow-net

  # ontology-knowledge-graph — типизированная онтология (Postgres) sidecar:
  # закрытый словарь предикатов, провенанс-цитаты, Comparability Gate,
  # evidence/gaps/contradictions/experts. Internal-only (без публичного порта),
  # вызывается backend'ом по HTTP (ONTOLOGY_KG_URL) — та же схема интеграции,
  # что science-knowledge-graph. Живёт в СОБСТВЕННОЙ базе `ontology` того же
  # инстанса db (схему создаёт сам при старте) — не пересекается с alembic-
  # миграциями backend'а. См. ontology/README.md.
  ontology-knowledge-graph:
    build:
      context: services/ontology-knowledge-graph
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - ONTOLOGY_DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/ontology
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_INTENT_MODEL=${LLM_INTENT_MODEL:-Openai/Gpt-oss-120b}
      - ONTOLOGY_LLM_INTENT=${ONTOLOGY_LLM_INTENT:-1}
      - ONTOLOGY_LLM_SYNTH=${ONTOLOGY_LLM_SYNTH:-1}
    # metalcrow-net — как у science-knowledge-graph: чтобы ingest_shared мог
    # достучаться до парсера на http://parser-main:8114 (SHARED-корпус).
    networks:
      - default
      - metalcrow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # SPEC_V5 §4: L1 orchestrator — enqueue parser pipeline on SHARED raw files.
  svc-parse-docling:
    build:
      context: .
      dockerfile: services/parse-docling/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - PARSER_URL=${PARSER_URL:-http://parser-main:8114}
    networks:
      - default
      - metalcrow-net

  svc-parse-docling-api:
    build:
      context: .
      dockerfile: services/parse-docling/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: ["uvicorn", "parse_docling.main:app", "--host", "0.0.0.0", "--port", "8101"]
    profiles:
      - tools

  adminer:
    image: adminer
    restart: always
    depends_on:
      - db
    environment:
      - ADMINER_DESIGN=pepa-linha-dark

  prestart:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      # Парсер — отдельный compose-стек (`make up`); backend не health-гейтим на него.
      # Не health-гейтим backend на science-knowledge-graph — сервис опциональный,
      # недоступность деградирует до пустого результата (see
      # app/services/science_kg_client.py), depends_on здесь только для порядка
      # старта, не для готовности.
      science-knowledge-graph:
        condition: service_started
      # Аналогично опционален: недоступность онтологии деградирует до
      # пустого результата (app/services/ontology_client.py).
      ontology-knowledge-graph:
        condition: service_started
    env_file:
      - .env
    environment:
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-changethis}
      - MINIO_BUCKET=${MINIO_BUCKET:-metalcrow-documents}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - PARSER_URL=${PARSER_URL:-http://parser-main:8114}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD?Variable not set}
      - SCIENCE_KG_URL=http://science-knowledge-graph:8000
      # ReAct-агент (SPEC_V3 §5.7). Включён по умолчанию: при заданном LLM URL/ключе
      # отвечает агент, иначе (или при любой ошибке LLM) — прежний водопад.
      - LLM_AGENT_ENABLED=${LLM_AGENT_ENABLED:-true}
      - LLM_AGENT_GATEWAY_URL=${LLM_AGENT_GATEWAY_URL:-}
      - LLM_AGENT_API_KEY=${LLM_AGENT_API_KEY:-}
      # Пусто по умолчанию → агент падает назад на общий LLM_INTENT_MODEL (модель
      # сайдкаров). Свою модель агента задавать только вместе со своим gateway.
      - LLM_AGENT_MODEL=${LLM_AGENT_MODEL:-}
      - OKF_ROOT=/app/okf
      # litsearch tool: `start_search` (abstract synthesis + OpenAlex search +
      # fetch dispatch) runs INLINE in the backend request handler, so the
      # backend needs the same litsearch/LLM/fetcher config as worker-litsearch
      # (which also calls start_search for follow-up rounds). Without LLM_* here
      # the abstract answer #1 silently degrades to the template fallback.
      - ARTICLE_FETCHER_URL=http://article-fetcher:8200
      - LITSEARCH_BASE_URL=${LITSEARCH_BASE_URL:-}
      - LITSEARCH_API_KEY=${LITSEARCH_API_KEY:-}
      - LITSEARCH_LLM_MODEL=${LITSEARCH_LLM_MODEL:-deepseek/deepseek-v4-flash__or}
      - LITSEARCH_LLM_TIMEOUT=${LITSEARCH_LLM_TIMEOUT:-180}
      - LITSEARCH_MAX_RESULTS=${LITSEARCH_MAX_RESULTS:-5}
      - LITSEARCH_MAX_ROUNDS=${LITSEARCH_MAX_ROUNDS:-2}
      - LITSEARCH_FULLTEXT_CHAR_CAP=${LITSEARCH_FULLTEXT_CHAR_CAP:-60000}
      - LITSEARCH_FETCH_TIMEOUT=${LITSEARCH_FETCH_TIMEOUT:-180}
      - LITSEARCH_INGEST_ENABLED=${LITSEARCH_INGEST_ENABLED:-true}
    volumes:
      - ./okf:/app/okf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - metalcrow-net

  # article-fetcher — internal-only sidecar (OpenAlex search + DOI/URL PDF
  # download, optional headless-stealth tier). Internal-only (no published
  # port): backend/worker-litsearch reach it at http://article-fetcher:8200
  # (ARTICLE_FETCHER_URL). See services/article-fetcher/README.md.
  article-fetcher:
    build:
      context: .
      dockerfile: services/article-fetcher/Dockerfile
    restart: always
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_BUCKET=${MINIO_BUCKET:-metalcrow-documents}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-changethis}
      - MINIO_PUBLIC_ENDPOINT=http://minio:9000
      - REDIS_URL=redis://redis:6379/0
      - OPENALEX_API_KEY=${OPENALEX_API_KEY:-}
      - OPENALEX_MAILTO=${OPENALEX_MAILTO:-}
      - CYBERLENINKA_PROXY_URL=${CYBERLENINKA_PROXY_URL:-socks5h://37.16.81.138:1080}

  # worker-litsearch — Celery worker for the litsearch tool loop's
  # asynchronous steps (monitor/reconcile/synthesize/add_to_database, Tasks
  # 8-10). Explicit `:celery_app` app path avoids auto-discovery ambiguity
  # with the other Celery apps in this repo (worker-etl/embed/graph),
  # matching their convention.
  worker-litsearch:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    # Phase B is I/O-bound (LLM calls + PDF-download waits, which the heartbeat
    # releases the slot for), so prefork slots free up quickly. 6 handles a burst
    # of ~10 concurrent users with modest queueing; the real ceiling is the LLM
    # gateway's concurrent-request capacity. To scale further: cap the SQLAlchemy
    # pool, switch to a gevent pool (-P gevent -c 20+), or run replicas
    # (`--scale worker-litsearch=N`). See docs/litsearch-findings.md.
    command: ["celery", "-A", "app.worker.litsearch_app:celery_app", "worker", "-Q", "litsearch", "--concurrency=6", "--loglevel=info"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      article-fetcher:
        condition: service_started
    env_file:
      - .env
    environment:
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-changethis}
      - MINIO_BUCKET=${MINIO_BUCKET:-metalcrow-documents}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD?Variable not set}
      - SCIENCE_KG_URL=http://science-knowledge-graph:8000
      - ARTICLE_FETCHER_URL=http://article-fetcher:8200
      - LITSEARCH_BASE_URL=${LITSEARCH_BASE_URL:-}
      - LITSEARCH_API_KEY=${LITSEARCH_API_KEY:-}
      - LITSEARCH_LLM_MODEL=${LITSEARCH_LLM_MODEL:-deepseek/deepseek-v4-flash__or}
      - LITSEARCH_LLM_TIMEOUT=${LITSEARCH_LLM_TIMEOUT:-180}
      - LITSEARCH_MAX_RESULTS=${LITSEARCH_MAX_RESULTS:-5}
      - LITSEARCH_MAX_ROUNDS=${LITSEARCH_MAX_ROUNDS:-2}
      - LITSEARCH_FULLTEXT_CHAR_CAP=${LITSEARCH_FULLTEXT_CHAR_CAP:-60000}
      - LITSEARCH_FETCH_TIMEOUT=${LITSEARCH_FETCH_TIMEOUT:-180}
      - LITSEARCH_INGEST_ENABLED=${LITSEARCH_INGEST_ENABLED:-true}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Left empty on purpose: the app calls the API via a relative path
        # (e.g. /api/v1/...) and nginx (this container) proxies it to the
        # backend container internally. This makes the same built image work
        # on localhost, any server IP or any domain without a rebuild.
        - VITE_API_URL=${VITE_API_URL:-}
        - NODE_ENV=production
    restart: always
    depends_on:
      - backend

volumes:
  app-db-data:
  redis-data:
  minio-data:
  # neo4j no longer uses a named volume — it's a bind mount (./neo4j-data)
  # now, see the `neo4j` service above.

networks:
  # Shared bridge to the standalone nornickel-2026-parser stack (make up).
  # Create once: `docker network create metalcrow-net` (dev-up.sh does this).
  metalcrow-net:
    external: true
