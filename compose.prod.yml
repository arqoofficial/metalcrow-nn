# Оверлей для запуска на сервере (хакатон-деплой): наружу торчит только
# фронтенд, без Traefik и без указания порта в адресе (80 — порт по
# умолчанию для HTTP, поэтому в браузере достаточно http://<ip-сервера>).
#
# db, adminer, backend доступны только внутри docker-сети — фронтенд (nginx)
# проксирует запросы /api на backend внутри сети.
#
# Запуск:
#   docker compose -f compose.yml -f compose.prod.yml up -d --build

services:
  frontend:
    ports:
      - "${FRONTEND_PORT:-80}:80"

  # Read-only bind mount of the parser SHARED folder so the precomputed-facts
  # loader can read facts/vectors without copying ~1 GB into the container.
  # Relative path is resolved against the project (repo-root) dir. Harmless for
  # the running service (read-only, unused at runtime); consumed only by the
  # one-shot `scripts/load_precomputed_facts.py` — see
  # services/science-knowledge-graph/README.md → "Load precomputed facts".
  science-knowledge-graph:
    volumes:
      - ./services/nornickel-2026-parser/SHARED:/shared:ro
