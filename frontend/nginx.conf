server {
  listen 80;

  # Backend allows up to 50MB per file (SPEC_V5 §9). Default nginx limit is 1MB.
  client_max_body_size 55m;

  # E2 (infra robustness): a bare `proxy_pass http://backend:8000;` resolves
  # `backend` ONCE at nginx startup and caches that IP forever — recreating
  # the backend container (new IP on Docker's bridge network) without also
  # restarting/reloading this frontend container then breaks proxying with
  # stale-upstream connection errors. Routing proxy_pass through a variable
  # forces nginx to re-resolve per request via the `resolver` directive
  # below (Docker's embedded DNS at 127.0.0.11, same as every other service
  # in compose.yml addressing `backend`/`frontend` by name) instead of
  # caching at startup. `$backend_upstream` carries no trailing path
  # segment, so the request URI still passes through unchanged — identical
  # semantics to the literal `http://backend:8000` used before.
  resolver 127.0.0.11 valid=30s;
  set $backend_upstream http://backend:8000;

  # Chat SSE stream (POST /api/v1/chat/sessions/{id}/messages) needs
  # buffering disabled, otherwise nginx holds the response until it fills a
  # buffer and the stream appears to hang (SPEC_V3 §3 nginx SSE config).
  location /api/v1/chat/ {
    proxy_pass $backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    chunked_transfer_encoding on;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Reverse-proxy to the backend container over the internal Docker network,
  # so only this (frontend) port needs to be published to the outside world.
  location /api/ {
    proxy_pass $backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /landing {
    rewrite ^ /landing/index.html last;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri /index.html =404;
  }
}
