# Ручной набор поверх сгенерированных grounded-вопросов (data/generated/grounded_raw.json).
# Собирается в итоговый data/questions.yaml скриптом scripts/build_dataset.py.
#
# Содержит: флагманские вопросы из требований задачи и типовые экспертные запросы; структурные
# вопросы, проверяющие маршрутизацию к инструментам онтологии; контроли честности
# (вопросы вне корпуса — система обязана честно сказать «данных нет»); англоязычные
# вопросы (мультиязычность из ТЗ); проверку болтовни/приветствия.

# ── Флагманские вопросы ТЗ / экспертов (грунтованы по распарсенному корпусу) ──

- id: flagship-desalination-tz
  lang: ru
  category: water_desalination
  question: 'Какие методы обессоливания и удаления сульфатов из шахтных вод применимы при содержании сульфатов 200–300 мг/л и требовании по сухому остатку ≤1000 мг/дм³, и каких степеней удаления они достигают?'
  expected_mode: ontology
  expected_tools_any: [literature_review, evidence_profile, evidence]
  weight: 1.0
  difficulty: hard
  grounding_note: '«Методы очистки шахтных вод.docx» (ОИП-02-2025) и «Наилучшие доступные технологии». Методы: обратный осмос/нанофильтрация, электродиализ, ионный обмен, осаждение известью (HDS), осаждение сульфата бария, эттрингитные процессы (SAVMIN). Числа: известь удаляет сульфат до 1500–2500 мг/л; SAVMIN на Stillfontein — с 800 до <200 мг/л. Ограничения по сухому остатку/сульфатам в вопросе — из формулировки ТЗ.'
  gold:
    must_include_any: ['обратн', 'нанофильтрац', 'электродиализ', 'ионный обмен', 'известь', 'сульфат бария', 'эттрингит', 'SAVMIN']
    expected_sources: ['Методы очистки шахтных вод', 'Наилучшие доступные технологии']
    min_numeric_values: 3
    min_citations: 1

- id: flagship-electrowinning-catholyte-tz
  lang: ru
  category: electrowinning
  question: 'Какие технические решения по циркуляции католита применяются при электроэкстракции никеля и какие плотности тока и скорости потока считаются оптимальными?'
  expected_mode: ontology
  expected_tools_any: [evidence, evidence_profile, compare_technologies]
  weight: 1.0
  difficulty: hard
  grounding_note: '«Обзор технических решений в области электролитического производства никеля и меди.docx». Католит, циркуляция электролита, плотность тока (А/м²), выход по току. Конкретные значения — в сгенерированных electrowinning-вопросах.'
  gold:
    must_include_any: ['католит', 'циркуляц', 'электроэкстракц', 'плотность тока', 'выход по току', 'скорость']
    expected_sources: ['электролитического производства никеля и меди']
    min_numeric_values: 2
    min_citations: 1

- id: flagship-pgm-matte-slag-tz
  lang: ru
  category: pgm_matte_slag
  question: 'Как распределяются золото, серебро и металлы платиновой группы между медным/никелевым штейном и шлаком по зарубежным данным последних лет, и какими коэффициентами распределения это описывается?'
  expected_mode: ontology
  expected_tools_any: [evidence, evidence_profile, literature_review]
  weight: 1.0
  difficulty: hard
  grounding_note: '«Распределение Au, Ag и МПГ между медным/никелевым штейном и шлаком.docx» — обзор по зарубежным источникам. Системы: медный штейн/железосиликатный шлак, газ/шлак/штейн/шпинель, равновесия медь/шлак и медь/штейн/шлак. Числовые коэффициенты — в сгенерированных pgm-вопросах.'
  gold:
    must_include_any: ['коэффициент распределения', 'штейн', 'шлак', 'железосиликатн', 'шпинель']
    expected_sources: ['Распределение Au']
    min_numeric_values: 2
    min_citations: 1

- id: flagship-furnace-feed-methods
  lang: ru
  category: furnace_feed
  question: 'Какими способами подают дисперсное сырьё и концентрат в печи взвешенной плавки и плавки в жидкой ванне, и в чём преимущества пневматического вдувания концентрата в расплав?'
  expected_mode: ontology
  expected_tools_any: [literature_review, compare_technologies, evidence]
  weight: 1.0
  difficulty: medium
  grounding_note: '«Вдувание дисперсного сырья в ванну расплава.docx» (ОИП-10-2020). Способы: концентрационные горелки (взвешенная плавка), ввод в/над жидкой ванной, пневматическое вдувание (системы Clyde, Macawber/British Steel), процессы Noranda (пескомёт), Teniente (пушка Гарра), Mitsubishi (подвесная фурма), Ванюков. Преимущество вдувания сухого концентрата — улучшение теплового баланса.'
  gold:
    must_include_any: ['вдуван', 'концентрационные горелки', 'взвешенн', 'жидкой ванн', 'фурм', 'пневмо']
    expected_sources: ['Вдувание дисперсного']
    min_numeric_values: 1
    min_citations: 1

# ── Структурные вопросы: маршрутизация к инструментам онтологии ──────────────

- id: structural-contradictions
  lang: ru
  category: structural
  question: 'Есть ли в данных противоречия или расхождения между источниками по извлечению и другим величинам?'
  expected_mode: ontology
  expected_tools_any: [find_contradictions]
  weight: 0.6
  difficulty: easy
  grounding_note: 'Проверка маршрутизации к инструменту find_contradictions (Comparability Gate). Ответ зависит от наполнения онтологии.'
  gold:
    must_include_any: ['противореч', 'расхожден', 'сопостав', 'нет противоречий']

- id: structural-gaps
  lang: ru
  category: structural
  question: 'Где в базе знаний пробелы: какие материалы, величины или темы покрыты слабо или совсем не изучены?'
  expected_mode: ontology
  expected_tools_any: [find_gaps]
  weight: 0.6
  difficulty: easy
  grounding_note: 'Проверка маршрутизации к find_gaps (gap-map: пустые ячейки материал×величина, гео-эксклюзивные процессы, темы с малым числом источников).'
  gold:
    must_include_any: ['пробел', 'нет данных', 'мало источников', 'не покрыт', 'только']

