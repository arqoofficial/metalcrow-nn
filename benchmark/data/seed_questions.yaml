# ── Контроли честности: вопросы вне распарсенного корпуса ────────────────────

- id: water_injection-deep-horizons-control
  lang: ru
  category: water_injection
  question: 'Какие способы закачки шахтных/сточных вод в глубокие горизонты (нагнетательные и поглощающие скважины) существуют и каковы их технико-экономические показатели?'
  expected_mode: auto
  answerable: false
  weight: 1.0
  difficulty: hard
  grounding_note: 'Типовой экспертный запрос по эксплуатации. В распарсенном подкорпусе тема закачки/захоронения вод в глубокие горизонты НЕ раскрыта: «Доклад Вострикова» — про утилизацию SO2, «Глубокие рудники_2017» — про охлаждение глубоких рудников (лёд/вода), не про закачку. Контроль честности: система должна сообщить об отсутствии данных, а не выдумать ТЭП. При добавлении соответствующих документов в корпус — сменить answerable на true и добавить gold.'
  gold:
    expect_no_data: true

