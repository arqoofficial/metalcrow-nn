[project]
name = "tool-sdk"
version = "0.1.0"
description = "Shared FastAPI skeleton for tool/parser microservices (SPEC_V5 §3)"
requires-python = ">=3.11,<4.0"
dependencies = [
    "fastapi[standard]>=0.139.0,<1.0.0",
    "pydantic>=2.0,<3.0",
]

[dependency-groups]
dev = [
    "httpx<1.0.0,>=0.25.1",
    "pytest<10.0.0,>=7.4.3",
    "ruff<1.0.0,>=0.2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tool_sdk"]
